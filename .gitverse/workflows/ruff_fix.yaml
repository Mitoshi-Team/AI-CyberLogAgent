name: Run Ruff Check + Fix Issues

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Позволяет запускать вручную через интерфейс CI/CD

jobs:
  ruff-check-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ gitverse.head_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      # Флаг для отслеживания общего статуса
      - name: Initialize error flag
        run: |
          echo "OVERALL_ERRORS=0" >> $GITHUB_ENV

      # === PEP 8 checks (E, W) ===
      - name: Run PEP 8 checks (E, W)
        continue-on-error: true
        run: |
          echo "=== Running PEP 8 checks (E, W) ==="
          # Сначала пытаемся исправить
          ruff check . --select E,W --fix --show-fixes
          # Повторная проверка без --fix
          if ruff check . --select E,W; then
            echo "✅ PEP 8 checks passed after fix."
          else
            echo "❌ PEP 8 checks FAILED after fix!"
            echo "OVERALL_ERRORS=1" >> $GITHUB_ENV
          fi

      # === flake8 checks (F, I) ===
      - name: Run flake8 checks (F, I)
        continue-on-error: true
        run: |
          echo "=== Running flake8 checks (F, I) ==="
          ruff check . --select F,I --fix --show-fixes
          if ruff check . --select F,I; then
            echo "✅ flake8 checks passed after fix."
          else
            echo "❌ flake8 checks FAILED after fix!"
            echo "OVERALL_ERRORS=1" >> $GITHUB_ENV
          fi

      # === flake8-bugbear checks (B) ===
      - name: Run flake8-bugbear checks (B)
        continue-on-error: true
        run: |
          echo "=== Running flake8-bugbear checks (B) ==="
          ruff check . --select B --fix --show-fixes
          if ruff check . --select B; then
            echo "✅ flake8-bugbear checks passed after fix."
          else
            echo "❌ flake8-bugbear checks FAILED after fix!"
            echo "OVERALL_ERRORS=1" >> $GITHUB_ENV
          fi

      # === comprehension checks (C4) ===
      - name: Run comprehension checks (C4)
        continue-on-error: true
        run: |
          echo "=== Running comprehension checks (C4) ==="
          ruff check . --select C4 --fix --show-fixes
          if ruff check . --select C4; then
            echo "✅ comprehension checks passed after fix."
          else
            echo "❌ comprehension checks FAILED after fix!"
            echo "OVERALL_ERRORS=1" >> $GITHUB_ENV
          fi

      # === pyupgrade checks (UP) ===
      - name: Run pyupgrade checks (UP)
        continue-on-error: true
        run: |
          echo "=== Running pyupgrade checks (UP) ==="
          ruff check . --select UP --fix --show-fixes
          if ruff check . --select UP; then
            echo "✅ pyupgrade checks passed after fix."
          else
            echo "❌ pyupgrade checks FAILED after fix!"
            echo "OVERALL_ERRORS=1" >> $GITHUB_ENV
          fi

      # === security checks (S) ===
      - name: Run security checks (bandit, S)
        continue-on-error: true
        run: |
          echo "=== Running security checks (bandit, S) ==="
          ruff check . --select S --fix --show-fixes
          if ruff check . --select S; then
            echo "✅ security checks passed after fix."
          else
            echo "❌ security checks FAILED after fix!"
            echo "OVERALL_ERRORS=1" >> $GITHUB_ENV
          fi

      # === docstring style checks (D) ===
      - name: Run docstring style checks (pydocstyle, D)
        continue-on-error: true
        run: |
          echo "=== Running docstring style checks (pydocstyle, D) ==="
          ruff check . --select D --extend-ignore=D100 --fix --show-fixes
          if ruff check . --select D --extend-ignore=D100; then
            echo "✅ docstring checks passed after fix."
          else
            echo "❌ docstring checks FAILED after fix!"
            echo "OVERALL_ERRORS=1" >> $GITHUB_ENV
          fi

      # === import sorting checks (ISC) ===
      - name: Run import sorting checks (isort, ISC)
        continue-on-error: true
        run: |
          echo "=== Running import sorting checks (isort, ISC) ==="
          ruff check . --select ISC --fix --show-fixes
          if ruff check . --select ISC; then
            echo "✅ import sorting checks passed after fix."
          else
            echo "❌ import sorting checks FAILED after fix!"
            echo "OVERALL_ERRORS=1" >> $GITHUB_ENV
          fi

      # === Format code ===
      - name: Format code with ruff
        continue-on-error: true
        run: |
          echo "=== Formatting code with ruff ==="
          ruff format .
          if ruff format . --check; then
            echo "✅ Formatting passed."
          else
            echo "❌ Formatting FAILED after fix!"
            echo "OVERALL_ERRORS=1" >> $GITHUB_ENV
          fi

      # Сбор изменений и коммит
      - name: Commit and push changes
        if: env.OVERALL_ERRORS == '0'
        run: |
          if git diff --quiet; then
            echo "No changes needed after ruff fix and format."
          else
            echo "Changes were made by ruff. Committing and pushing..."
            git config user.name "gitverse-actions[bot]"
            git config user.email "gitverse-actions[bot]@users.noreply.gitverse.com"
            git add .
            git commit -m "style: auto-fix code style issues with ruff [skip ci]"
            git push
          fi
        env:
          # Prevent CI from triggering on its own push
          CI: true

      # Финальная проверка: если были ошибки, завершаем с ошибкой
      - name: Check for overall errors
        run: |
          if [ "$OVERALL_ERRORS" = "1" ]; then
            echo "\n\n❌ ОБНАРУЖЕНЫ ОШИБКИ, КОТОРЫЕ ТРЕБУЮТ ВНИМАНИЯ!\n"
            echo "Пожалуйста, проверьте логи и исправьте указанные проблемы."
            exit 1
          else
            echo "\n\n✅ Все проверки пройдены успешно!"
          fi

      # Вывод всех неисправленных ошибок
      - name: Show all remaining errors
        if: failure()
        run: |
          echo "\n\n📋 ПОДРОБНЫЙ ОТЧЁТ О НЕИСПРАВЛЕННЫХ ОШИБКАХ:\n"
          echo "========================================"

          echo "\n🔹 PEP 8 (E, W):"
          ruff check . --select E,W --format=concise || echo "  No PEP 8 issues."

          echo "\n🔹 flake8 (F, I):"
          ruff check . --select F,I --format=concise || echo "  No flake8 issues."

          echo "\n🔹 flake8-bugbear (B):"
          ruff check . --select B --format=concise || echo "  No flake8-bugbear issues."

          echo "\n🔹 Comprehensions (C4):"
          ruff check . --select C4 --format=concise || echo "  No comprehension issues."

          echo "\n🔹 pyupgrade (UP):"
          ruff check . --select UP --format=concise || echo "  No pyupgrade issues."

          echo "\n🔹 Security (S):"
          ruff check . --select S --format=concise || echo "  No security issues."

          echo "\n🔹 Docstrings (D):"
          ruff check . --select D --extend-ignore=D100 --format=concise || echo "  No docstring issues."

          echo "\n🔹 Import sorting (ISC):"
          ruff check . --select ISC --format=concise || echo "  No import sorting issues."

          echo "\n🔹 Formatting issues:"
          ruff format . --check --diff || echo "  No formatting issues."

          echo "\n✅ Проверка завершена. Исправьте указанные ошибки и запустите снова."