name: Run Ruff Check + Fix Issues

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Позволяет запускать вручную через интерфейс CI/CD

jobs:
  ruff-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ gitverse.head_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      # Флаг для отслеживания наличия неисправимых ошибок
      - name: Initialize error flag
        run: |
          echo "ERRORS_FOUND=0" >> $GITHUB_ENV

      # Запуск всех проверок параллельно с отслеживанием ошибок
      - name: Run PEP 8 checks (E, W)
        run: |
          echo "=== Running PEP 8 checks (E, W) ==="
          if ruff check . --select E,W --fix --show-fixes; then
            echo "PEP 8 checks passed."
          else
            echo "ERRORS_FOUND=1" >> $GITHUB_ENV
            echo "[!] PEP 8 checks failed. Please review the issues."
          fi

      - name: Run flake8 checks (F, I)
        run: |
          echo "=== Running flake8 checks (F, I) ==="
          if ruff check . --select F,I --fix --show-fixes; then
            echo "flake8 checks passed."
          else
            echo "ERRORS_FOUND=1" >> $GITHUB_ENV
            echo "[!] flake8 checks failed. Please review the issues."
          fi

      - name: Run flake8-bugbear checks (B)
        run: |
          echo "=== Running flake8-bugbear checks (B) ==="
          if ruff check . --select B --fix --show-fixes; then
            echo "flake8-bugbear checks passed."
          else
            echo "ERRORS_FOUND=1" >> $GITHUB_ENV
            echo "[!] flake8-bugbear checks failed. Please review the issues."
          fi

      - name: Run comprehension checks (C4)
        run: |
          echo "=== Running comprehension checks (C4) ==="
          if ruff check . --select C4 --fix --show-fixes; then
            echo "comprehension checks passed."
          else
            echo "ERRORS_FOUND=1" >> $GITHUB_ENV
            echo "[!] comprehension checks failed. Please review the issues."
          fi

      - name: Run pyupgrade checks (UP)
        run: |
          echo "=== Running pyupgrade checks (UP) ==="
          if ruff check . --select UP --fix --show-fixes; then
            echo "pyupgrade checks passed."
          else
            echo "ERRORS_FOUND=1" >> $GITHUB_ENV
            echo "[!] pyupgrade checks failed. Please review the issues."
          fi

      - name: Run security checks (bandit, S)
        run: |
          echo "=== Running security checks (bandit, S) ==="
          if ruff check . --select S --fix --show-fixes; then
            echo "security checks passed."
          else
            echo "ERRORS_FOUND=1" >> $GITHUB_ENV
            echo "[!] security checks failed. Please review the issues."
          fi

      - name: Run docstring style checks (pydocstyle, D)
        run: |
          echo "=== Running docstring style checks (pydocstyle, D) ==="
          if ruff check . --select D --extend-ignore=D100 --fix --show-fixes; then
            echo "docstring checks passed."
          else
            echo "ERRORS_FOUND=1" >> $GITHUB_ENV
            echo "[!] docstring checks failed. Please review the issues."
          fi

      - name: Run import sorting checks (isort, ISC)
        run: |
          echo "=== Running import sorting checks (isort, ISC) ==="
          if ruff check . --select ISC --fix --show-fixes; then
            echo "import sorting checks passed."
          else
            echo "ERRORS_FOUND=1" >> $GITHUB_ENV
            echo "[!] import sorting checks failed. Please review the issues."
          fi

      - name: Format code with ruff
        run: |
          echo "=== Formatting code with ruff ==="
          if ruff format .; then
            echo "Formatting passed."
          else
            echo "ERRORS_FOUND=1" >> $GITHUB_ENV
            echo "[!] Formatting failed. Please review the issues."
          fi

      # Сбор изменений и коммит
      - name: Commit and push changes
        run: |
          if git diff --quiet; then
            echo "No changes needed after ruff fix and format."
          else
            echo "Changes were made by ruff. Committing and pushing..."
            git config user.name "gitverse-actions[bot]"
            git config user.email "gitverse-actions[bot]@users.noreply.gitverse.com"
            git add .
            git commit -m "style: auto-fix code style issues with ruff [skip ci]"
            git push
          fi

      # Финальная проверка: если ошибки были, завершаем с ошибкой
      - name: Check for errors
        run: |
          if [ "$ERRORS_FOUND" = "1" ]; then
            echo "\n\n❌ ОБНАРУЖЕНЫ ОШИБКИ, КОТОРЫЕ ТРЕБУЮТ ВНИМАНИЯ!\n"
            echo "Пожалуйста, проверьте логи и исправьте указанные проблемы."
            exit 1
          else
            echo "\n\n✅ Все проверки пройдены успешно!"
          fi
        env:
          # Prevent CI from triggering on its own push
          CI: true