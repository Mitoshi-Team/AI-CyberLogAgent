name: Build and Push to DockerHub

on:
  push:
    branches: [axstiz]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Podman
        run: |
          apt-get update
          apt-get install -y podman

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_KEY_AXSTIZ }}" | podman login docker.io -u axstiz --password-stdin

      - name: Generate date tag
        run: echo "DATE_TAG=$(date +%Y-%m-%d)" >> $GITHUB_ENV

      - name: Build and push with Podman
        run: |
          podman build \
            -t docker.io/axstiz/ai-cyberlogagent:latest \
            -t docker.io/axstiz/ai-cyberlogagent:$DATE_TAG \
            -f log_ai_agent/Dockerfile \
            log_ai_agent/
          podman push docker.io/axstiz/ai-cyberlogagent:latest
          podman push docker.io/axstiz/ai-cyberlogagent:$DATE_TAG