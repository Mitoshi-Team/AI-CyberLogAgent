name: Build and Push to DockerHub

on:
  push:
    branches: [axstiz]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install skopeo
        run: |
          apt-get update
          apt-get install -y skopeo

      - name: Install docker
        run: |
          apt-get install -y docker.io

      - name: Login to GitVerse Registry
        run: |
          echo '${{ github.token }}' | skopeo login cr.gitverse.ru -u ${{ github.actor }} --password-stdin

      - name: Generate date tag
        run: echo "DATE_TAG=$(date +%Y-%m-%d)" >> $GITHUB_ENV

      - name: Build and push with skopeo
        run: |
          # Create a simple OCI image using buildah
          buildah --version || apt-get install -y buildah
          
          # Build image using buildah (no daemon needed)
          buildah bud --layers -t cr.gitverse.ru/${{ github.repository }}:latest -f log_ai_agent/Dockerfile log_ai_agent/
          
          # Tag for date
          buildah tag cr.gitverse.ru/${{ github.repository }}:latest cr.gitverse.ru/${{ github.repository }}:$DATE_TAG
          
          # Push using skopeo
          buildah push cr.gitverse.ru/${{ github.repository }}:latest
          buildah push cr.gitverse.ru/${{ github.repository }}:$DATE_TAG