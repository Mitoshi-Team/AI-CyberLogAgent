name: Build and Push to DockerHub

on:
  push:
    branches: [axstiz]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: axstiz
          password: ${{ secrets.DOCKERHUB_KEY_AXSTIZ }}

      - name: Generate date tag
        run: echo "DATE_TAG=$(date +%Y-%m-%d)" >> $GITHUB_ENV

      - name: Install Kaniko
        run: |
          wget -q -O /usr/local/bin/executor https://github.com/GoogleContainerTools/kaniko/releases/download/v1.23.0/executor-linux-amd64
          chmod +x /usr/local/bin/executor
          mkdir -p /kaniko/.docker

      - name: Create Kaniko config
        run: |
          cat > /kaniko/.docker/config.json <<EOF
          {
            "auths": {
              "https://index.docker.io/v1/": {}
            }
          }
          EOF

      - name: Build and push with Kaniko
        run: |
          /usr/local/bin/executor \
            --context ./log_ai_agent \
            --dockerfile log_ai_agent/Dockerfile \
            --destination axstiz/ai-cyberlogagent:latest \
            --destination axstiz/ai-cyberlogagent:$DATE_TAG