name: Build and Push Docker Image

on:
  push:
    branches: [axstiz]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitVerse Registry
        uses: docker/login-action@v3
        with:
          registry: gitverse.ru
          username: ${{ gitverse.actor }}
          password: ${{ secrets.GITVERSE_TOKEN }}

      - name: Build and push with Kaniko
        uses: docker://gcr.io/kaniko-project/executor:v1.24.0
        with:
          context: ./log_ai_agent
          dockerfile: ./log_ai_agent/Dockerfile
          destination: gitverse.ru/mitoshi_team/ai-cyberlogagent:latest
          push-mode: registry
          verbosity: info

      - name: Push version tag
        if: startsWith(github.ref, 'v')
        run: |
          VERSION=${{ gitverse.ref_name }}
          docker buildx imagetools create \
            -t gitverse.ru/mitoshi_team/ai-cyberlogagent:${VERSION} \
            gitverse.ru/mitoshi_team/ai-cyberlogagent:latest