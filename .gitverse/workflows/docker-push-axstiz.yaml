name: Build and Push Docker Image

on:
  push:
    branches: [ "axstiz" ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitVerse Registry
        uses: docker/login-action@v3
        with:
          registry: gitverse.ru
          username: ${{ secrets.GITVERSE_USER }}
          password: ${{ secrets.GITVERSE_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: gitverse.ru/mitoshi_team/ai-cyberlogagent

      - name: Build and push with Kaniko
        uses: docker://gcr.io/kaniko-project/executor:v1.24.0
        with:
          args: >
            --context=./log_ai_agent
            --dockerfile=./log_ai_agent/Dockerfile
            --destination=gitverse.ru/mitoshi_team/ai-cyberlogagent:latest
            --Destination=gitverse.ru/mitoshi_team/ai-cyberlogagent:${{ github.run_number }}
            --label=org.opencontainers.image.created=${{ steps.meta.outputs.created }}
            --label=org.opencontainers.image.description=${{ steps.meta.outputs.description }}
            --label=org.opencontainers.image.revision=${{ github.sha }}
            --label=org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}