name: Build and Push to DockerHub

on:
  push:
    branches: [axstiz]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitVerse Registry
        uses: docker/login-action@v3
        with:
          registry: cr.gitverse.ru
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Generate date tag
        run: echo "DATE_TAG=$(date +%Y-%m-%d)" >> $GITHUB_ENV

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./log_ai_agent
          file: ./log_ai_agent/Dockerfile
          push: true
          tags: |
            cr.gitverse.ru/${{ github.repository }}:latest
            cr.gitverse.ru/${{ github.repository }}:${{ env.DATE_TAG }}